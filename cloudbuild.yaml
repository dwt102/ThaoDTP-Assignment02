##############################################################################
# Healthcare ETL Pipeline — CI/CD Pipeline
# Triggered on every push to the `main` branch.
#
# Full pipeline flow after deploy:
#   parent_dag (daily 5AM)
#     └─► pyspark_dag  — Dataproc: PostgreSQL → GCS Landing
#           start_cluster
#           → hospitalA_postgresToLanding.py
#           → hospitalB_postgresToLanding.py
#           → claims.py
#           → cpt_codes.py
#           stop_cluster (ALL_DONE)
#     └─► bigquery_dag — Medallion: Bronze → Silver → Gold
#           bronze_tables (External Tables via bronze.sql)
#           → silver_tables (CDM + SCD2 via silver.sql)
#           → gold_tables  (6 Analytical tables via gold.sql)
#
# CI/CD Steps:
#   1. validate-dags   — py_compile all 3 DAGs
#   2. run-tests       — pip install (pinned) + unittest
#   3. deploy-all      — DAGs + SQL files + Ingestion scripts → GCS
#   4. trigger-dag     — trigger parent_dag
##############################################################################

substitutions:
  _COMPOSER_BUCKET:   "gs://asia-southeast1-healthcare--5e26beaf-bucket"
  _COMPOSER_ENV:      "healthcare-composer"
  _COMPOSER_LOCATION: "asia-southeast1"

steps:
  # ── Step 1: Validate DAG syntax (all 3 DAGs) ──────────────────────────────
  - id: "validate-dags"
    name: "python:3.11-slim"
    entrypoint: bash
    args: ["scripts/validate_dag.sh"]

  # ── Step 2: Run unit tests ─────────────────────────────────────────────────
  - id: "run-tests"
    name: "python:3.11-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        set -e
        pip install -r requirements.txt
        echo "============================================================"
        echo " STEP 2/4 — Unit Tests"
        echo "============================================================"
        AIRFLOW_HOME=/tmp/airflow \
        AIRFLOW__CORE__UNIT_TEST_MODE=True \
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow/airflow.db \
        python -m pytest tests/ -v --tb=short
    waitFor: ["validate-dags"]

  # ── Step 4: Deploy DAGs + SQL + Ingestion scripts ──────────────────────────
  - id: "deploy-all"
    name: "gcr.io/cloud-builders/gsutil"
    entrypoint: bash
    args: ["scripts/deploy_dag.sh"]
    env:
      - "COMPOSER_BUCKET=${_COMPOSER_BUCKET}"
    waitFor: ["run-tests"]

  # ── Step 5: Trigger parent_dag ─────────────────────────────────────────────
  - id: "trigger-dag"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: bash
    args: ["scripts/trigger_dag.sh"]
    env:
      - "COMPOSER_ENV=${_COMPOSER_ENV}"
      - "COMPOSER_LOCATION=${_COMPOSER_LOCATION}"
    waitFor: ["deploy-all"]

# ── Build log saved to GCS for audit ──────────────────────────────────────────
artifacts:
  objects:
    location: "gs://healthcare-bucket-thaodtp/cicd-logs/$BUILD_ID/"
    paths:
      - "cloudbuild.yaml"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_MEDIUM"

timeout: "1800s"
